version: '3.8'

services:
  postgres:
    container_name: shelf-erp-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shelf_erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_dev_2025
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d shelf_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: shelf-erp-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
